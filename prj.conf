# Matter core
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="src/chip_project_config.h"
CONFIG_STD_CPP17=y

# Device identity
CONFIG_CHIP_DEVICE_PRODUCT_NAME="Water Leak Sensor"
CONFIG_CHIP_DEVICE_VENDOR_NAME="DJ Tech"
CONFIG_CHIP_DEVICE_SERIAL_NUMBER="12234545"
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION=1
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION_STRING="1.0.0"
CONFIG_CHIP_DEVICE_HARDWARE_VERSION=1
CONFIG_CHIP_DEVICE_HARDWARE_VERSION_STRING="1.0.0"
CONFIG_CHIP_DEVICE_VENDOR_ID=65521
CONFIG_BT_DEVICE_NAME="MatterWater"

# ZAP
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/src/default_zap/water_sensor.zap"

# Commissioning
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
CONFIG_CHIP_BLE_EXT_ADVERTISING=n
CONFIG_CHIP_BLE_ADVERTISING_DURATION=15

# Drivers
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_DK_LIBRARY=y

# Power management
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_RAM_POWER_DOWN_LIBRARY=y

# Disable LEDs via Kconfig
CONFIG_NCS_SAMPLE_MATTER_LEDS=n

# OpenThread MTD settings
CONFIG_OPENTHREAD_NORDIC_LIBRARY_MTD=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_FTD=n
CONFIG_OPENTHREAD_MTD_SED=y

# Child timeouts - must be larger than slow poll interval
# Slow poll is 30000ms so set these well above that
CONFIG_OPENTHREAD_MLE_CHILD_TIMEOUT=1200
CONFIG_OPENTHREAD_CHILD_SUPERVISION_CHECK_TIMEOUT=1200
CONFIG_OPENTHREAD_CHILD_SUPERVISION_INTERVAL=1200

# ICD - Long Idle Time device
CONFIG_CHIP_ENABLE_ICD_SUPPORT=y
CONFIG_CHIP_ICD_LIT_SUPPORT=y
CONFIG_CHIP_ICD_CHECK_IN_SUPPORT=y
CONFIG_CHIP_ICD_UAT_SUPPORT=y

# LIT requires slow poll > 15000ms
CONFIG_CHIP_ICD_FAST_POLLING_INTERVAL=500
CONFIG_CHIP_ICD_IDLE_MODE_DURATION=3600
CONFIG_CHIP_ICD_ACTIVE_MODE_DURATION=5000
CONFIG_CHIP_ICD_ACTIVE_MODE_THRESHOLD=5000
CONFIG_CHIP_ICD_REPORT_ON_ACTIVE_MODE=y
CONFIG_CHIP_ICD_SLOW_POLL_INTERVAL=60000




# Disable SSED - conflicts with LIT
CONFIG_CHIP_THREAD_SSED=n

# Disable unused features
CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n
CONFIG_CHIP_FACTORY_DATA=n
CONFIG_CHIP_FACTORY_DATA_BUILD=n
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_DFU_MULTI_IMAGE=n
CONFIG_DFU_TARGET=n
CONFIG_DFU_TARGET_MCUBOOT=n

# Disable debug features
CONFIG_CHIP_LIB_SHELL=n
CONFIG_SHELL=n
CONFIG_LOG=n
CONFIG_PRINTK=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_RESET_ON_FATAL_ERROR=n

# Power saving extras
CONFIG_ASSERT_VERBOSE=n
CONFIG_ASSERT_NO_FILE_INFO=y
CONFIG_THREAD_NAME=n
CONFIG_BOOT_BANNER=n
CONFIG_LTO=y
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y
CONFIG_NCS_SAMPLE_MATTER_WATCHDOG=y
